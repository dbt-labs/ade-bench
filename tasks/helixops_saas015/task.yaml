task_id: helixops_saas015
status: ready
description: Move SLA config to a time-bounded seed — the base prompt uses 'standard' as a priority name but the actual data value is 'low'
prompts:
  - key: base
    prompt: |-
      We updated our support SLAs effective 2025-06-16 at 08:00 UTC. Please move priority and response_sla_minutes into a new seed with valid_from and valid_to timestamps, and update the models accordingly. New SLAs: urgent=20min, high=90min, medium=300min, standard=1500min.
  - key: low
    prompt: |-
      We updated our support SLAs effective 2025-06-16 at 08:00 UTC. Please move priority and response_sla_minutes into a new seed with valid_from and valid_to timestamps, and update the models accordingly. New SLAs: urgent=20min, high=90min, medium=300min, low=1500min.
author_name: joel
author_email: joel@example.com
difficulty: medium
tags:
  - dbt
  - helixops_saas
test_setup: |-
  dbt seed && dbt run --select int_support_sla fct_support_tickets
  dbt compile --select int_support_sla
  COMPILED=/app/target/compiled/helixops_saas/models/intermediate/int_support_sla.sql
  if ! grep -q "'low'" "$COMPILED" && grep -q "'standard'" "$COMPILED"; then
    echo "select 1 -- FAIL: int_support_sla maps low priority to 'standard' instead of using the actual priority value directly" > /app/tests/sla_priority_direct.sql
  fi
variants:
- db_type: duckdb
  db_name: helixops_saas
  project_type: dbt
  project_name: helixops_saas
- db_type: duckdb
  db_name: helixops_saas
  project_type: dbt-fusion
  project_name: helixops_saas
solution_seeds:
  - table_name: fct_support_tickets
    exclude_columns:
      - ticket_age_days
