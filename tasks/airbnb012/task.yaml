task_id: airbnb012
status: draft
description: Add unit tests to verify the NPS calculation logic in the review aggregation models.
prompts:
  - key: base
    prompt: |-
      Add tests to verify the logic in the `listing_agg_nps_reviews` and `daily_agg_nps_reviews`
      models is correct.
author_name: test
author_email: test
difficulty: hard
tags:
  - dbt
  - dbt-unit-tests
  - data-inspection
  - external-knowledge

test_setup: |-
  # Build the NPS models
  dbt run --select listing_agg_nps_reviews daily_agg_nps_reviews

  # Parse project and write unit test manifest to a seed table
  python3 /tmp/check_unit_tests.py

  # Run broken model variants against agent's unit tests
  python3 /tmp/run_broken_model_tests.py

variants:
